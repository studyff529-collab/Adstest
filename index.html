<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Word Counter Tool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f4f7f6; color: #333; line-height: 1.6; }
        header, footer { background: #2563eb; color: white; text-align: center; padding: 1rem; }
        header h1 { margin-bottom: 0.5rem; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        textarea { 
            width: 100%; height: 200px; padding: 1rem; 
            border: 2px solid #cbd5e1; border-radius: 8px; 
            font-size: 1rem; resize: vertical; outline: none; 
        }
        textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        .stats { display: flex; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
        .stat-box { 
            background: white; padding: 1rem; border-radius: 8px; 
            flex: 1; min-width: 120px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .stat-box span { font-size: 2rem; font-weight: bold; color: #2563eb; display: block; }
        
        /* Ad Slot Styling */
        .ad-slot { 
            background: #e2e8f0; border: 2px dashed #94a3b8; 
            margin: 1.5rem auto; padding: 1rem; text-align: center; 
            border-radius: 8px; min-height: 90px; 
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .ad-slot:hover { 
            border-color: #2563eb; 
            background: #dbeafe;
            box-shadow: 0 4px 12px rgba(37,99,235,0.15);
        }
        .ad-slot::after {
            content: "ADVERTISEMENT";
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 10px;
            color: #94a3b8;
            font-weight: 600;
            letter-spacing: 0.5px;        }
        .ad-content {
            color: #2563eb;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: block;
            padding: 10px;
        }
        .ad-content:hover {
            text-decoration: underline;
        }
        
        footer { margin-top: 2rem; font-size: 0.9rem; padding: 1rem 0; }
        @media (max-width: 600px) { 
            .stats { flex-direction: column; } 
            textarea { height: 150px; } 
        }
    </style>
    
    <!-- PropellerAds Script (Optional - for advanced tracking) -->
    <script async="async" data-cfasync="false" src="//omg10.com/1/10844539/direct.js"></script>
</head>
<body>
    <header>
        <h1>📝 Free Word Counter</h1>
        <!-- AD SLOT 1: HEADER -->
        <div class="ad-slot" onclick="window.open('https://omg10.com/4/10844539', '_blank')">
            <a href="https://omg10.com/4/10844539" target="_blank" rel="noopener noreferrer" class="ad-content" onclick="event.stopPropagation()">
                🔥 Sponsored Link - Click Here
            </a>
            <p style="color:#777; font-size:12px; margin-top:8px;">Ad Space (728x90)</p>
        </div>
    </header>

    <main>
        <div class="container">
            <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
            <div class="stats">
                <div class="stat-box">
                    <span id="wordCount">0</span>
                    <p>Words</p>
                </div>
                <div class="stat-box">
                    <span id="charCount">0</span>
                    <p>Characters</p>
                </div>
            </div>

            <!-- AD SLOT 2: MID -->            <div class="ad-slot" onclick="window.open('https://omg10.com/4/10844539', '_blank')">
                <a href="https://omg10.com/4/10844539" target="_blank" rel="noopener noreferrer" class="ad-content" onclick="event.stopPropagation()">
                    🎁 Special Offer - Check Now
                </a>
                <p style="color:#777; font-size:12px; margin-top:8px;">Ad Space (300x250)</p>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Quick Tools Hub | Built for Testing</p>
        <!-- AD SLOT 3: FOOTER -->
        <div class="ad-slot" onclick="window.open('https://omg10.com/4/10844539', '_blank')">
            <a href="https://omg10.com/4/10844539" target="_blank" rel="noopener noreferrer" class="ad-content" onclick="event.stopPropagation()">
                ⚡ Visit Sponsor Site
            </a>
            <p style="color:#777; font-size:12px; margin-top:8px;">Ad Space (Responsive)</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const textInput = document.getElementById('textInput');
            const wordCountEl = document.getElementById('wordCount');
            const charCountEl = document.getElementById('charCount');

            function updateCounts() {
                const text = textInput.value.trim();
                const words = text === '' ? 0 : text.split(/\s+/).filter(word => word.length > 0).length;
                const chars = text.length;
                wordCountEl.textContent = words;
                charCountEl.textContent = chars;
            }
            textInput.addEventListener('input', updateCounts);
            
            // Optional: Track ad clicks for analytics
            document.querySelectorAll('.ad-slot').forEach(ad => {
                ad.addEventListener('click', function(e) {
                    if(!e.target.closest('a')) {
                        console.log('Ad clicked - PropellerAds Direct Link');
                    }
                });
            });
        });
    </script>
</body>
</html>
