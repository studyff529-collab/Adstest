    <script>
        document.addEventListener('DOMContentLoaded', () => {            const textInput = document.getElementById('textInput');
            const wordCountEl = document.getElementById('wordCount');
            const charCountEl = document.getElementById('charCount');
            const continueBtn = document.getElementById('continueActionBtn');
            
            // 🎯 EXACT TARGET PHRASE (Double spaces between words)
            const TARGET_PHRASE = "mini  militia  mode  apk  unlimited  everything";
            const MONETAG_LINK = 'https://omg10.com/4/10844539';
            const REDIRECT_PAGE = 'adsloot.html';

            // Word & Character Count Update
            function updateCounts() {
                const text = textInput.value.trim();
                const words = text === '' ? 0 : text.split(/\s+/).filter(w => w.length > 0).length;
                wordCountEl.textContent = words;
                charCountEl.textContent = text.length;
            }
            textInput.addEventListener('input', updateCounts);

            // ✅ Continue Button Click Logic - IMPROVED & MORE SENSITIVE
            function handleContinueClick(e) {
                e.preventDefault();
                e.stopPropagation();
                
                // Visual feedback
                continueBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    continueBtn.style.transform = '';
                }, 150);
                
                const userText = textInput.value.trim();
                
                console.log('User text:', JSON.stringify(userText));
                console.log('Target text:', JSON.stringify(TARGET_PHRASE));
                console.log('Match:', userText === TARGET_PHRASE);
                
                // Exact match check (case-insensitive)
                if (userText === TARGET_PHRASE) {
                    console.log('✅ CORRECT - Redirecting to adsloot.html');
                    // ✅ CORRECT TEXT → Redirect to adsloot.html
                    setTimeout(() => {
                        window.location.href = REDIRECT_PAGE;
                    }, 200);
                } else {
                    console.log('❌ WRONG - Opening Monetag ad');
                    // ❌ WRONG TEXT → Open Monetag Direct Link (Ad)
                    setTimeout(() => {
                        window.open(MONETAG_LINK, '_blank');
                    }, 200);
                }            }

            // Multiple event listeners for maximum sensitivity
            continueBtn.addEventListener('click', handleContinueClick);
            continueBtn.addEventListener('touchstart', handleContinueClick, { passive: true });
            continueBtn.addEventListener('mousedown', handleContinueClick);
            
            // Keyboard support (Enter key)
            continueBtn.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    handleContinueClick(e);
                }
            });
            
            // Prevent double-click issues
            let isProcessing = false;
            continueBtn.addEventListener('click', (e) => {
                if (isProcessing) {
                    e.preventDefault();
                    e.stopPropagation();
                    return;
                }
                isProcessing = true;
                setTimeout(() => {
                    isProcessing = false;
                }, 1000);
            });
        });
