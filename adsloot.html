        let continueClickCount = parseInt(localStorage.getItem('continueClickCount') || '0');

        const wallpaperContainer = document.getElementById('wallpaperContainer');

        // ================= FUNCTIONS =================

        // Wallpaper Box Click → Direct Ad Open
        function handleWallpaperClick() {
            window.open(AD_LINK, '_blank');
            showNotification('🎁 Ad opened in new tab!');
        }

        // Scroll Button → Scroll + Ad Open
        function handleScrollClick() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            setTimeout(() => {
                window.open(AD_LINK, '_blank');
                showNotification('🎁 Scrolled + Ad opened!');
            }, 300);
        }

        // Continue Button → 1st/2nd = Ad, 3rd = Download
        function handleContinueClick() {
            const btn = document.getElementById('continueBtn');
            if (btn.disabled) return;
            continueClickCount++;
            localStorage.setItem('continueClickCount', continueClickCount.toString());
            const remaining = CLICKS_TO_UNLOCK - continueClickCount;

            if (continueClickCount < CLICKS_TO_UNLOCK) {
                window.open(AD_LINK, '_blank');
                showNotification(`🎁 Ad opened! ${remaining} more click${remaining > 1 ? 's' : ''} needed`);
                btn.innerHTML = `⬇️ Click Again (${remaining} left)<br><small>${remaining} more to unlock download</small>`;
            } else {
                showNotification('✅ Unlock successful! Opening download...');
                btn.innerHTML = `✅ Download Starting...<br><small>Please wait...</small>`;
                btn.style.background = 'linear-gradient(135deg, #00b894, #00cec9)';
                setTimeout(() => {
                    window.location.href = DOWNLOAD_LINK;
                }, 800);
            }
        }

        // Show Notification
        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed; top: 100px; left: 50%; 
                transform: translateX(-50%);
                background: #00b894; color: white; 
                padding: 15px 30px; border-radius: 50px; 
                font-weight: 500; z-index: 2000;
                box-shadow: 0 4px 20px rgba(0,184,148,0.4);
            `;
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Generate 35 Wallpaper Boxes
        function generateBoxes() {
            wallpapers.forEach((url, index) => {
                const box = document.createElement('div');
                box.className = 'wallpaper-box';
                box.innerHTML = `
                    <img src="${url}" alt="Wallpaper ${index+1}" loading="lazy">
                    <div class="box-content">
                        <div class="box-title">🎨 HD Wallpaper #${index+1}</div>
                        <button class="box-btn">🔓 View + Ad</button>
                    </div>
                `;
                box.addEventListener('click', handleWallpaperClick);
                wallpaperContainer.appendChild(box);
            });
        }
        // Circular Timer
        function startTimer() {
            let timeLeft = TIMER_SECONDS;
            const updateTimer = () => {
                timeLeft--;
                timerText.textContent = timeLeft;
                const percent = ((TIMER_SECONDS - timeLeft) / TIMER_SECONDS) * 100;
                timerCircle.style.background = `conic-gradient(#6c5ce7 ${percent}%, #2d3436 ${percent}%)`;
                
                if (timeLeft > 0) {
                    setTimeout(updateTimer, 1000);
                } else {
                    timerLabel.textContent = 'Ready! Click button 3 times to unlock 🔓';
                    continueBtn.disabled = false;
                    continueBtn.classList.add('active');
                    continueBtn.innerHTML = `⬇️ Click to Start (3 clicks needed)<br><small>1st & 2nd = Ads, 3rd = Download</small>`;
                }
            };
            updateTimer();
        }

        // ================= INIT =================
        document.addEventListener('DOMContentLoaded', () => {
            generateBoxes();
            startTimer();
            scrollBtn.addEventListener('click', handleScrollClick);
            continueBtn.addEventListener('click', handleContinueClick);
            console.log(`🔢 Continue clicks so far: ${continueClickCount}`);
        });
